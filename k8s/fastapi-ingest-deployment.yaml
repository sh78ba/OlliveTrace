apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-ingest
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fastapi-ingest
  template:
    metadata:
      labels:
        app: fastapi-ingest
    spec:
      containers:
      - name: fastapi-ingest
        image: ollivetrace-fastapi-ingest:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-ingest-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-ingest
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: External
    external:
      metric:
        name: redis_stream_lag
      target:
        type: Value
        value: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-ingest-svc
spec:
  selector:
    app: fastapi-ingest
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
