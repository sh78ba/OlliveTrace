apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: next-app
  template:
    metadata:
      labels:
        app: next-app
    spec:
      containers:
      - name: next-app
        image: ollivetrace-next-app:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: next-app-svc
spec:
  selector:
    app: next-app
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: next-app-ingress
spec:
  rules:
  - host: ollivetrace.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: next-app-svc
            port:
              number: 80
